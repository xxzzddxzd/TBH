# TaskBarHero plugin config.
# This file is updated by the overlay when settings change.
target_game_version=1.00.21
plugin_version=1.00.21
plugin_subversion=404

# speed: target Unity Time.timeScale.
speed=5.0
speed_step=1.0
speed_min=1.0
speed_max=30.0

# Experience multipliers. Both are clamped to 1..10.
exp_multiplier=1.0
cube_exp_multiplier=10.0

# Show a small speed/lock overlay after injection.
overlay=1
overlay_x=20
overlay_y=80

# When enabled, the overlay lock button can lock the current stage.
# Lock triggers an automatic return to the locked stage every interval.
# The overlay lock column can adjust this interval by seconds.
auto_portal=1
auto_portal_interval_ms=60000
auto_portal_locked=0
auto_portal_stage_key=0
auto_portal_enter_key=0
auto_portal_act=0
auto_portal_difficulty=0
auto_portal_stage_type=0
auto_portal_stage_no=0

# Skip normal monster waves and spawn the stage boss directly.
# This is off by default; toggle it in the overlay with boss:on/off.
direct_boss=0

# Replace the normal stage boss monster with the current act's ACTBOSS monster.
# Drops still use the normal stage boss chest path.
actboss_boss=0

# Automatically switch between boss and normal flow when the opposite chest
# countdown reaches 0, then switch back after that chest drops.
auto_switch=0

# Automatically synthesize equipment through the game's Cube auto-fill flow.
# Only Gear synthesis is used; the game's auto-fill decides the concrete recipe.
auto_synthesis=0
auto_synthesis_use_storage=1

# Automatically lock opened chest rewards whose item id is selected
# in the overlay lock list or matches enabled lock conditions.
auto_item_lock=1
item_lock_condition_high_grade=1
item_lock_condition_coin=1
item_lock_condition_market_top=1
auto_item_lock_ids=

# x-10 ACTBOSS soul-stone bypass is disabled.
free_actboss_enter=0

# Drop observation hooks are enabled for normal/boss chest interval tracking.
drop_hooks=1
force_drop_roll=0

# Reward/drop hooks are disabled.
reward_trace_hooks=0
force_box_reward_select=0

keep_boxdata_after_select=0

# Keep this at 0 unless the hook applies too late in your environment.
# The primary path applies speed from Unity Time calls on the game thread.
background_apply=0
apply_interval_ms=1000
